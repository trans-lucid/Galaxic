services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    networks:
      - translucid
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d app
      interval: 5s
      timeout: 5s
      retries: 20
