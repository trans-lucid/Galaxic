openapi: 3.0.3
info:
  title: Galaxic Backend API Example
  version: 0.1.0
paths:
  /health:
    get:
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
  /items:
    get:
      responses:
        "200":
          description: Example items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
